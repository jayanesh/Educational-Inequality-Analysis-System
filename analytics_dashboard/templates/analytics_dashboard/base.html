<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}School Dropout Analysis | SDG 4{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent-primary: #38bdf8;
            --accent-secondary: #818cf8;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --nav-bg: rgba(15, 23, 42, 0.8);
        }

        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-primary);
            margin: 0; 
            padding: 0;
            background-image: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
        }

        /* Navigation Bar */
        nav {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: var(--nav-bg);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 600;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 30px;
        }

        .nav-link {
            text-decoration: none;
            color: var(--text-secondary);
            font-weight: 400;
            transition: color 0.3s ease, border-bottom 0.3s ease;
            position: relative;
            padding-bottom: 5px;
        }

        .nav-link:hover, .nav-link.active {
            color: var(--accent-primary);
        }

        .nav-link.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--accent-primary);
            box-shadow: 0 0 10px var(--accent-primary);
        }

        .container {
            padding: 40px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .header { 
            text-align: center; 
            margin-bottom: 50px; 
            animation: fadeInDown 1s ease-out;
        }

        .header h1 { 
            font-size: 2.8rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Generic Card Styling */
        .card { 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        /* Responsive */
        @media (max-width: 768px) {
            nav { padding: 15px 20px; flex-direction: column; gap: 15px; }
            .container { padding: 20px; }
        }

    </style>
    <style>
        .logout-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-family: inherit;
            font-size: inherit;
        }
        
        .signup-nav {
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            color: white !important;
            padding: 8px 20px !important;
            border-radius: 50px;
            margin-left: 10px;
        }
        
        .signup-nav:hover {
            opacity: 0.9;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>

    <nav>
        <a href="/" class="logo">Student Dropout & Educational Inequality Analysis System</a>
        <div class="nav-links">
            <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">📊 Dashboard</a>
            <a href="/explorer/" class="nav-link {% if '/explorer/' in request.path %}active{% endif %}">📋 View Details</a>
            {% if user.is_authenticated %}
                <form action="{% url 'logout' %}" method="POST" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit" class="nav-link logout-btn">🚪 Logout ({{ user.username }})</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}" class="nav-link {% if '/login/' in request.path %}active{% endif %}">🔑 Login</a>
                <a href="{% url 'signup' %}" class="nav-link signup-nav {% if '/signup/' in request.path %}active{% endif %}">✨ Signup</a>
            {% endif %}
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

</body>
</html>
